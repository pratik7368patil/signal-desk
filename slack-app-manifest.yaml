_metadata:
  major_version: 1
  minor_version: 0
display_information:
  name: SignalDesk
features:
  bot_user:
    display_name: SignalDesk
    always_online: false
  shortcuts:
    - name: Draft with SignalDesk
      type: message
      callback_id: signald_draft_with_signald
      description: Create a private SignalDesk draft from this message.
oauth_config:
  redirect_urls:
    - http://127.0.0.1:31337/slack/oauth/callback
  scopes:
    bot:
      - app_mentions:read
      - commands
      - chat:write
      - users:read
      - channels:history
    user:
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - search:read
      - chat:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  is_hosted: false
  token_rotation_enabled: false

# Optional personal mention mode:
# Add message.channels plus the relevant bot/user history scopes for the places where
# SignalDesk should watch for <@USER_ID> mentions.
