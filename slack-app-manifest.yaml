_metadata:
  major_version: 1
  minor_version: 0
display_information:
  name: SignalDesk
features:
  bot_user:
    display_name: SignalDesk
    always_online: true
  shortcuts:
    - name: Draft with SignalDesk
      type: message
      callback_id: signald_draft_with_signald
      description: Create a private SignalDesk draft from this message.
    - name: Watch with SignalDesk
      type: message
      callback_id: signald_watch_with_signald
      description: Privately watch this thread for follow-up signals.
oauth_config:
  redirect_urls:
    - http://127.0.0.1:31337/slack/oauth/callback
  scopes:
    bot:
      - app_mentions:read
      - commands
      - chat:write
      - users:read
      - channels:history
      - reactions:write
      - im:write
    user:
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - search:read
      - chat:write
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  is_hosted: false
  token_rotation_enabled: false

# Optional private/personal surfaces:
# Add the relevant message events and history scopes for private channels, MPIMs,
# and DMs where SignalDesk should watch for <@USER_ID> mentions or watched-thread updates.
# Optional scopes:
